name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Type Check
      run: npx tsc --noEmit

    - name: Run Unit Tests
      run: npm run test
      
    # Uncomment when Playwright is fully configured
    # - name: Run E2E Tests
    #   run: npx playwright test

    - name: Build Next.js App
      run: npm run build
      env:
        # Dummy env vars for build phase
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dummy"
        NEXTAUTH_SECRET: "dummy_secret_for_build"
        NEXTAUTH_URL: "http://localhost:3000"
